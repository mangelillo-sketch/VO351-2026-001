<!-- JAVASCRIPT -->
È un linguaggio di scripting utilizzato nella programmazione di siti web lato client e pertanto non necessita di un server per il suo funzionamento.
Javascript può essere incluso all'interno di una pagina HTML sia internamente che esternamente (con un file con estensione .js).
<body>
    <script type="text/javascript">
        //Codice qui//
    </script>
</body>
