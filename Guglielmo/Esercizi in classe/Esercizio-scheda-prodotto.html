<!DOCTYPE html>
<html lang="it">
    <head>

        <meta charset="UTF-8">
        <title>Prodotto da vendere</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://kit.fontawesome.com/848ca3c8d0.js" crossorigin="anonymous"></script>
    </head>

    <body>
        <div class="product-card" id="container">
            <header>
                <h1>PC Portatile</h1>
            </header>
        </div>

        <main>
            <div class="Immagine">
                <img src="../Img/Immagine-esercizio.webp" alt="Pc portatile da 1terabyte"> <!-- Navigazione tra cartelle -->
                title="Immagine Pc in vendita">
            </div>

            <div class="informazioni">
                <h2>Informazioni prodotto</h2>
                <p>Pc portatile Mac di ultima generazione.</p>
                <p>Memoria da 1 TB, processore ecc... alla modica cifra di <span style="color: red; text-decoration: underline;">1299,99&euro;</span>.</p> <!-- Codice univoco per l'euro -->
            </div>

            <div class="compra oggetto">
                <i class="fa-solid fa-cart-shopping" style="font-size: medium;">
                </i>
                <a href="" title="Aggiungi al carrello">Aggiungi al carrello</a>
                <a href="" title="dettaglio">Visulizza dettagli</a>
            </div>    
        </main>
    </body>  
</html>
