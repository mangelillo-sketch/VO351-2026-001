        <script type="text/javascript">
            /*OPERATORI ARITMETICI BINARI*/
            
            //Variabili
            var x1 = 2, x2 = 10;

            var x3 = x1 + x2;//12
            x3 = x2-x1;//8
            x3 = x1*x2;//20
            x3 = x2/x1;//5

            x3 = x2%x1;//0 (resto della divisione)
            x3 = 5%2;//1

            document.write("x3 vale: " + x3);
            console.log("x3 vale: " + x3);//stampo in consolle

        </script>
