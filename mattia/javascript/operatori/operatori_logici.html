<!DOCTYPE html>
<html>
    <head>

    </head>

    <body>

        <script type="text/javascript">
            /*OPERATORI LOGICI*/
            var a = 10;
            var b = 5;
            var c = 8;

            /*
            TAB DI VERITà AND (&&)
            cond a  | cond b    | a && b
            true    | true      | true
            true    | false     | false
            false   | true      | false
            false   | false     | false
            */
            console.log(a > b && a > c);


            /*
            TAB DI VERITà OR (||)
            cond a  | cond b    | a || b
            true    | true      | true
            true    | false     | true
            false   | true      | true
            false   | false     | false
            */
            console.log(a > b || a > c);

            /*
            TAB DI VERITà XOR (^)
            cond a  | cond b    | a ^ b
            true    | true      | false
            true    | false     | true
            false   | true      | true
            false   | false     | false
            */

            /*
            TAB DI VERITà NOT (!)
            cond a  | !a
            true    | false
            false   | true
            */
            console.log( !((9%2)==0) );
            console.log( !(a > b || a > c));

        </script>

    </body>
</html>
