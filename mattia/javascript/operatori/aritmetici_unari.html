<!DOCTYPE html>
<html>
    <head>

    </head>

    <body>

        <script type="text/javascript">
            /*OPERATORI ARITMETICI UNARI*/
            //Variabili
            var x1 = 2;

            var x3 = x1 ++;//x1=3 | x3 = 2 (post incremento)

            console.log("x1: " + x1);
            console.log("x3: " + x3);

            x3 = ++ x1;//x1=4 | x3 = 4 (pre incremento)
            console.log("x1: " + x1);
            console.log("x3: " + x3);

            x1 = 2;
            x3 = x1 --;//x1=1 | x3 = 2 (post decremento)
            console.log("\n\n");
            console.log("x1: " + x1);
            console.log("x3: " + x3);

            x3 = -- x1;//x1=4 | x3 = 4 (pre decremento)

            console.log("x1: " + x1);
            console.log("x3: " + x3);

        </script>

    </body>
</html>
