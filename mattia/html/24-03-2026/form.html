<!DOCTYPE html>
<html>
	<head>
		<style>
			.check input{display: none;}
			.check label{
				border: 1px solid;

			}
		</style>
	</head>
	
	<body>
		<!-- method="post|get" -->
		<form action="destinazione.php" method="get">
			<label for="nome">Nome</label>
			<input id="nome" type="text" name="nome" placeholder="Inserisci il nome"
				 minlength="10" maxlength="50" required />
			
			<input type="text" name="cognome" />
			<input type="text" name="cap" pattern="[0-9]{5}" placeholder="CAP" />
			<input type="email" /> <br />
			<input type="number" min="10" max="1000" step="10" />
			<input type="password" name="pass" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" /> <br />
			<input type="date" /> <br />
			<input type="datetime-local" name="dataregistrazione" /> <br />
			
			<input type="radio" name="opzione" value="si"> Si
			<input type="radio" name="opzione" value="no"> No <br />
			
			<div class="check">
				<input id="s1" type="checkbox" name="opzioneck[]" value="s1"> <label for="s1">Scelta 1 </label>
				<input id="s2" type="checkbox" name="opzioneck[]" value="s2"> <label for="s2">Scelta 2</label>
				<input type="checkbox" name="opzioneck[]" value="s3"> Scelta 3 
				<input type="checkbox" name="opzioneck[]" value="s4"> Scelta 4 <br />	
			</div>
			
			<textarea rows="10" cols="50">Default</textarea>
			<br />
			
			<select name="sel">
				<option value="Val1">Valore 1</option>
				<option value="Val2">Valore 2</option>
				<option value="Val3">Valore 3</option>
				<option value="Val4">Valore 4</option>
			</select>
			
			<select name="selmul[]" multiple>
				<option value="Val1">Valore 1</option>
				<option value="Val2">Valore 2</option>
				<option value="Val3">Valore 3</option>
				<option value="Val4">Valore 4</option>
			</select>
			
			<button>Pulsante generico</button>
			
			<input type="submit" value="Invia il form" />
			<input type="reset" value="Cancella form" />
			
		</form>
	</body>
</html>
