<!DocumentType html>
<html>
    <head>

    </head>
    <body>
        <script type="text/javascript">

            var sommaPositivi = 0;
            var sommaNegativi = 0;

            for (var i = -20; i <= 20; i++) {

                if (i >= 0) {
                    sommaPositivi = sommaPositivi + i;
                }
                else {
                    sommaNegativi = sommaNegativi + i;
                }
            }

            console.log("Somma positivi: " + sommaPositivi);
            console.log("Somma negativi: " + sommaNegativi);

        </script>
    </body>
</html>
