<!DocumentType html>
<html>
    <head>

    </head>
    <body>
        <script type="text/javascript">

            var sommaPari = 0;
            var sommaDispari = 0;

            for (var i = 1; i <= 20; i++) {

                if (i % 2 == 0) {
                    sommaPari = sommaPari + i;
                }
                else {
                    sommaDispari = sommaDispari + i;
                }
            }

            console.log("Somma pari: " + sommaPari);
            console.log("Somma dispari: " + sommaDispari);

        </script>
    </body>
</html>
