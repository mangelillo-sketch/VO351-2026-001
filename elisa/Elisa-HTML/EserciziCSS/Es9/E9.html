<!DOCTYPE html>
<html lang="it">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
</head>
    <style>
        div:not(.green){
            color: black;
        }

        .green{
            background-color: red;
        }
    </style>
    <body>
        <div class="red">1</div>
        <div class="red">2</div>
        <div class="red">3</div>
        <div class="red">4</div>
        <div class="red">5</div>

        <div class="green">1</div>
        <div class="green">2</div>
        <div class="green">3</div>
    </body>
 </html>
