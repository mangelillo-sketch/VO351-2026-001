<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Esercizio 21</title>
    <link rel="stylesheet" href="styles/style_es10.css" />
    <style>
      .browser-console {
        display: none;
        margin-top: 1rem;
        padding: 1rem;
        min-height: 180px;
        max-height: 320px;
        overflow: auto;
        color: #e8f0f2;
        background-color: #15171a;
        border: 1px solid #3b4048;
        border-radius: 6px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.9rem;
        text-align: left;
      }

      .browser-console.is-open {
        display: block;
      }

      .console-row {
        padding: 0.25rem 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .console-row.log {
        color: #e8f0f2;
      }

      .console-row.info {
        color: #71c7ec;
      }

      .console-row.warn {
        color: #ffd166;
      }

      .console-row.error {
        color: #ff6b6b;
      }
    </style>
  </head>
  <body class=" ">
    <div class="content">
      <hgroup>
        <h1 class="text-center">Esercizi slide</h1>
        <h2 class="text-center"><a href="index.html">(go home ->)</a></h2>
      </hgroup>
      <main class="flex">
        <!-- esercizio 1A -->
        <article>
          <h3 class="text-center">Console browser</h3>
          <p class="text-center">
            Clicca il pulsante per aprire una console nella pagina.
          </p>
          <button id="apriConsole" type="button">Apri console</button>
          <div
            id="consoleOutput"
            class="browser-console"
            aria-live="polite"
          ></div>
        </article>
      </main>
    </div>
    <script defer>
      const apriConsole = document.getElementById("apriConsole");
      const consoleOutput = document.getElementById("consoleOutput");

      function formatConsoleValue(value) {
        if (typeof value === "string") {
          return value;
        }

        if (value instanceof Error) {
          return value.stack || value.message;
        }

        try {
          return JSON.stringify(value, null, 2);
        } catch (error) {
          return String(value);
        }
      }

      function writeToPageConsole(method, values) {
        const methodName = String(method);

        if (methodName === "clear") {
          consoleOutput.innerHTML = "";
          return;
        }

        const row = document.createElement("div");
        const knownMethods = ["log", "info", "warn", "error"];
        row.className =
          "console-row " +
          (knownMethods.includes(methodName) ? methodName : "log");
        row.textContent = values.map(formatConsoleValue).join(" ");

        consoleOutput.appendChild(row);
        consoleOutput.scrollTop = consoleOutput.scrollHeight;
      }

      window.proxy = new Proxy(console, {
        get(target, property) {
          const originalValue = target[property];

          if (typeof originalValue !== "function") {
            return originalValue;
          }

          return function (...values) {
            writeToPageConsole(property, values);
            originalValue.apply(target, values);
          };
        },
      });
      const ponsole = window.proxy;

      apriConsole.addEventListener("click", function () {
        consoleOutput.classList.add("is-open");
        runner(ponsole);
      });
    </script>
    <!-- Script esercizio -->
    <script>
      function runner(console) {
        console.log(`
        Scrivi un programma che dato:
        un array di 10 elementi di numeri casuali interi (compresi tra 1 e 90 senza ripetizioni),
        un array di 10 numeri interi a tuo piacimento (compresi tra 1 e 90 senza ripetizioni)
        Verifichi quanti numeri scelti da te sono presenti nell'array principale e restituisca un risultato del tipo:
        2 numeri uguali => ambo
        3 numeri uguali => terna
        4 numeri uguali => quaterna
        5 numeri uguali => cinquina
        tutti i numeri uguali => tombola


        In caso di vittoria dovrà essere stampato un messaggio "Hai fatto X",
        in caso di perdita dovrà essere mostrato il messaggio "Mi dispiace, hai perso!".
        `);

        let array1 = [];
        let array2 = [1,4,6,7,9,12,13,14,18,20];
        for (let i = 0; i < 10; i++) {
          array1.push(Math.floor(Math.random() * 90) + 1);
        }
        console.log("casuali",array1);
        console.log("scelti da me",array2);
        let contatore = 0;
        for (let i = 0; i < array1.length; i++) {
          if (array2.includes(array1[i])) {
            contatore++;
          }
        }
        if (contatore == 2) {
          console.log("Ambo");
        } else if (contatore == 3) {
          console.log("Terna");
        } else if (contatore == 4) {
          console.log("Quaterna");
        } else if (contatore == 5) {
          console.log("Cinquina");
        } else if (contatore== array2.length-1) {
          console.log("Tombola");
        } else{
          console.log("Hai perso... riprova")
        }
      }
    </script>
  </body>
</html>
