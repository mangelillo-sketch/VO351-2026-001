<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Form input</title>
  </head>
  <body>
    <h1>Registrazione Nuovo Utente</h1>

    <form action="#" method="GET">
      <fieldset>
        <legend>Dati Personali</legend>

        <label for="nome">Nome *</label>
        <input
          type="text"
          id="nome"
          name="nome"
          required
          minlength="2"
          maxlength="50"
        />

        <label for="cognome">Cognome *</label>
        <input
          type="text"
          id="cognome"
          name="cognome"
          required
          minlength="2"
          maxlength="50"
        />

        <label for="nascita">Data di Nascita *</label>
        <input
          type="date"
          id="nascita"
          name="nascita"
          required
          max="2008-01-01"
          title="Devi avere almeno 18 anni"
        />
      </fieldset>
      <fieldset>
        <legend>Credenziali di Accesso</legend>

        <label for="email">Email *</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="nome@esempio.it"
        />

        <label for="password">Password *</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          minlength="8"
          title="Minimo 8 caratteri"
        />

        <label for="conferma">Conferma Password *</label>
        <input
          type="password"
          id="conferma"
          name="conferma"
          required
          minlength="8"
        />
      </fieldset>

      <fieldset>
        <legend>Informazioni di Contatto</legend>

        <label for="telefono">Telefono *</label>
        <input
          type="tel"
          id="telefono"
          name="telefono"
          pattern="[0-9]{9,10}"
          placeholder="3331234567"
          title="Inserisci 9 o 10 cifre"
          required
        />

        <label for="citta">Città *</label>
        <input type="text" id="citta" name="citta" required />
        <label for="provincia">Provincia</label>
        <select id="provincia" name="provincia">
          <option value="">Seleziona...</option>
          <option value="RM">Roma</option>
          <option value="MI">Milano</option>
          <option value="NA">Napoli</option>
          <option value="TO">Torino</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>Preferenze</legend>

        <label>
          <input type="checkbox" name="newsletter" />
          Iscriviti alla newsletter
        </label>

        <label>
          <input type="checkbox" name="termini" required />
          Accetto i termini e condizioni *
        </label>
      </fieldset>

      <button type="submit">Registrati</button>
    </form>
  </body>
</html>
