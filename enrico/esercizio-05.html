<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Esercizio 05 - scheda prodotto" />
        <title>Scheda prodotto</title>

        <style>
            body {
               /* reset */
                margin: 0;
                padding: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #eee;
            }

            .titolo{
               text-align: center;
               margin-bottom: 3rem;
            }

            .product-card{
               background-color: #fff;
               margin:1rem auto;
               max-width: 324px;
               border-radius: 10px;
               border: solid 1px #ccc;
               padding-bottom: 25px;
            }
            .product-info{
               margin: 0 12px;
            }

            .product-title{
               color: #403ccfff;
            }

            .product-image{
               border-radius: 10px;
               margin:12px auto;
               width: 300px;
            }

            .product-image img{
               max-width: 100%;
               min-width: 100%;
               height: auto;
               border-radius: 10px;
            }
            .product-description{
            }
            .price-section{
               margin-top: 1.25rem;
               text-align: right;
            }
            .current-price{
               color: #e73c3c; 
               font-size: 24px; 
               font-weight: bold;
            }
            .original-price{
               text-decoration: line-through; 
               /* color: #7f8c8d; */
               font-size: 18px; 
               margin-left: 10px;
            }

        </style>
    </head>
    <body>
      <main>
         <div class="titolo">
            <h1>Esercizio 05 - scheda prodotto</h1>
         </div>
         <div class="product-card" id="prodotto-example-1">
            <div class="product-image">
               <img src="https://picsum.photos/id/1/200/300.jpg?grayscale&blur=2"
                     alt="notebook gray" 
                     title="notebook gray">
               </div>
            <div class="product-info">
               <h2 class="product-title">
                  Pc portatile
               </h2>
               <p class="product-description">
               Pc portatile <strong>Asus</stro>
               16 pollici, <span style="color: #403ccfff;">500GB SSD</span> Scheda video <span style="color: rgb(7, 83, 0);">Nvidia</span>
               </p>
               <div class="price-section">
                  <span class="current-price" >
                  €800.00
                  </span>
                  <span class="original-price" >
                  €1050.00
                  </span>
               </div>
            </div>
        </div>
      </main>
    </body>    
</html>
