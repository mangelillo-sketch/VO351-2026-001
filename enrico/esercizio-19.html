<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Esercizio 19</title>
    <link rel="stylesheet" href="styles/style_es10.css" />
    <style>
      .browser-console {
        display: none;
        margin-top: 1rem;
        padding: 1rem;
        min-height: 180px;
        max-height: 320px;
        overflow: auto;
        color: #e8f0f2;
        background-color: #15171a;
        border: 1px solid #3b4048;
        border-radius: 6px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.9rem;
        text-align: left;
      }

      .browser-console.is-open {
        display: block;
      }

      .console-row {
        padding: 0.25rem 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .console-row.log {
        color: #e8f0f2;
      }

      .console-row.info {
        color: #71c7ec;
      }

      .console-row.warn {
        color: #ffd166;
      }

      .console-row.error {
        color: #ff6b6b;
      }
    </style>
  </head>
  <body class=" ">
    <div class="content">
      <hgroup>
        <h1 class="text-center">Esercizi slide</h1>
        <h2 class="text-center"><a href="index.html">(go home ->)</a></h2>
      </hgroup>
      <main class="flex">
        <!-- esercizio 1A -->
        <article>
          <h3 class="text-center">Console browser</h3>
          <p class="text-center">
            Clicca il pulsante per aprire una console nella pagina.
          </p>
          <button id="apriConsole" type="button">Apri console</button>
          <div
            id="consoleOutput"
            class="browser-console"
            aria-live="polite"
          ></div>
        </article>
      </main>
    </div>
    <script defer>
      const apriConsole = document.getElementById("apriConsole");
      const consoleOutput = document.getElementById("consoleOutput");

      function formatConsoleValue(value) {
        if (typeof value === "string") {
          return value;
        }

        if (value instanceof Error) {
          return value.stack || value.message;
        }

        try {
          return JSON.stringify(value, null, 2);
        } catch (error) {
          return String(value);
        }
      }

      function writeToPageConsole(method, values) {
        const methodName = String(method);

        if (methodName === "clear") {
          consoleOutput.innerHTML = "";
          return;
        }

        const row = document.createElement("div");
        const knownMethods = ["log", "info", "warn", "error"];
        row.className =
          "console-row " +
          (knownMethods.includes(methodName) ? methodName : "log");
        row.textContent = values.map(formatConsoleValue).join(" ");

        consoleOutput.appendChild(row);
        consoleOutput.scrollTop = consoleOutput.scrollHeight;
      }

      window.proxy = new Proxy(console, {
        get(target, property) {
          const originalValue = target[property];

          if (typeof originalValue !== "function") {
            return originalValue;
          }

          return function (...values) {
            writeToPageConsole(property, values);
            originalValue.apply(target, values);
          };
        },
      });
      const ponsole = window.proxy;

      apriConsole.addEventListener("click", function () {
        consoleOutput.classList.add("is-open");
        runner(ponsole);
      });
    </script>
    <!-- Script esercizio -->
    <script>
      function runner(console) {
        console.log(`Scrivere un programma che calcoli il risultato dell’esame di uno studente.
                      Il programma prenderà in ingresso (come variabile semplice):
                      Il voto ottenuto nella prova scritta (variabile tra -8 e +8)
                      Il voto ottenuto nella prova pratica (variabile tra 0 e 24)
                      Memorizzati questi dati procederà al calcolo del risultato finale in trentesimi procedendo come segue:
                      Il risultato finale è la somma dei risultati.
                      se il voto di teoria è minore (o uguale) di zero e la somma dei voti di teoria e pratica è maggiore di 18 lo studente è bocciato.
                      se il voto di teoria è minore (o uguale) di zero e il voto di pratica è minore di 18 lo studente è bocciato.
                      se il voto di teoria è maggiore di zero e la somma dei voti di teoria e pratica è minore di 18 lo studente è bocciato.
                      se la somma di teoria e pratica vale 31 o 32 il programma stampa: “congratulazioni: 30 e lode”
                      in tutti gli altri casi lo studente è promosso e viene riportato il voto calcolato.`);

        let teoria = parseInt(prompt("Inserisci il voto di teoria"));
        let pratica = parseInt(prompt("Inserisci il voto di pratica"));
        let risultato = teoria + pratica;
        if (teoria <= 0 && risultato > 18) {
          console.log(`Lo studente è bocciato`);
        } else if (teoria <= 0 && pratica < 18) {
          console.log(`Lo studente è bocciato`);
        } else if (teoria > 0 && risultato < 18) {
          console.log(`Lo studente è bocciato`);
        } else if (risultato == 31 || risultato == 32) {
          console.log(`Congratulazioni: 30 e lode`);
        } else {
          console.log(`Lo studente è promosso con: ${risultato}`);
        }
      }
    </script>
  </body>
</html>
